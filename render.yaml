services:
  # 1. Provide the Backend API (Bun)
  - type: web
    name: birthday-backend
    env: docker
    rootDir: backend
    envVars:
      - key: PORT
        value: 3001

  # 2. Host the Frontend (Vue 3 + Vite)
  - type: web
    name: birthday-frontend
    env: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    # Enable Vue Router Client-side routing
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_BACKEND_HOST
        fromService:
          type: web
          name: birthday-backend
          property: host